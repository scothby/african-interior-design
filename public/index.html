<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0C0806" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.json" />

  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#C05E3D", // Terracotta
            secondary: "#1A2B44", // Deep Indigo
            ochre: "#D4A373",
            "background-light": "#FDF8F1",
          },
          fontFamily: {
            display: ["'Playfair Display'", "serif"],
            sans: ["'Inter'", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "1rem",
            'button': "9999px",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    :root {
            --kente-bg: #f3e5ab;
        }
        .kente-pattern {
            background-color: #f1e4bc;
            background-image: 
                linear-gradient(45deg, #c05e3d 25%, transparent 25%), 
                linear-gradient(-45deg, #c05e3d 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1a2b44 75%), 
                linear-gradient(-45deg, transparent 75%, #1a2b44 75%),
                linear-gradient(0deg, #d4a373 10%, transparent 10%),
                linear-gradient(90deg, #d4a373 10%, transparent 10%);
            background-size: 80px 80px, 80px 80px, 80px 80px, 80px 80px, 40px 40px, 40px 40px;
            background-position: 0 0, 0 40px, 40px -40px, -40px 0px, 0 0, 0 0;
            opacity: 0.15;
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .glass-panel-tw {
            @apply backdrop-blur-xl bg-white/40 border border-white/40 shadow-2xl;
        }
        .dark .glass-panel-tw {
            @apply backdrop-blur-xl bg-slate-900/60 border border-slate-700/50 shadow-2xl;
        }
        .upload-zone-glass-tw {
            @apply bg-white/30 dark:bg-slate-800/20 border-2 border-dashed border-slate-400/50 dark:border-slate-500/30;
        }
    </style>
  <style>
    body {
      margin: 0;
      background: #0C0806;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body>
  <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
  <div id="root"></div>
</body>

</html>
